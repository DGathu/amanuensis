version: '3.8'

services:
  amanuensis:
    build: .
    container_name: amanuensis
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./amanuensis_data:/app/data
      
    # This pulls all secrets from the user's local .env file
    env_file:
      - .env
      
    environment:
      # Keep the database path hardcoded because it maps to the volume above
      - DATABASE_URL=file:/app/data/dev.db
      # Use an environment variable for the URL, defaulting to localhost if not provided
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}